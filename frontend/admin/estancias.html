<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUXORIA — Estancias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-menu" id="sidebarToggle">☰</button>
      <div class="topbar-breadcrumb"><span class="tb-muted">Admin</span><span class="tb-sep">›</span><span>Estancias</span></div>
      <div class="topbar-actions"><span class="topbar-date" id="topbarDate"></span></div>
    </header>
    <div class="admin-content">
      <div class="kpi-grid">
        <div class="kpi-card reveal"><div class="kpi-icon" style="color:var(--green)">▦</div><div class="kpi-body"><span class="kpi-label">En curso</span><span class="kpi-value" id="kpiActivas">0</span></div></div>
        <div class="kpi-card reveal" data-delay="60"><div class="kpi-icon" style="color:var(--gold)">◈</div><div class="kpi-body"><span class="kpi-label">Próximas</span><span class="kpi-value" id="kpiProximas">0</span></div></div>
        <div class="kpi-card reveal" data-delay="120"><div class="kpi-icon" style="color:var(--muted)">◎</div><div class="kpi-body"><span class="kpi-label">Finalizadas</span><span class="kpi-value" id="kpiFin">0</span></div></div>
        <div class="kpi-card reveal" data-delay="180"><div class="kpi-icon" style="color:var(--blue)">⬡</div><div class="kpi-body"><span class="kpi-label">Total</span><span class="kpi-value" id="kpiTotal">0</span></div></div>
      </div>
      <div class="content-grid">
        <div class="panel panel--wide reveal">
          <div class="panel__header">
            <div class="panel__title"><span class="panel-icon">▦</span>Estancias</div>
            <div class="panel__tools">
              <div class="search-box"><span class="search-icon">◎</span><input type="text" id="searchInput" placeholder="Buscar cliente, hotel…"/></div>
              <select class="admin-select" id="filterEstado"><option value="">Todos los estados</option><option value="Próxima">Próxima</option><option value="En curso">En curso</option><option value="Finalizada">Finalizada</option></select>
              <button class="btn-admin btn-admin--primary" id="btnNuevo">+ Nueva estancia</button>
            </div>
          </div>
          <div class="table-wrap">
            <table class="admin-table"><thead><tr><th>ID</th><th>Cliente</th><th>Hotel</th><th>Habitación</th><th>Entrada</th><th>Salida</th><th>Noches</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="estanciaBody"></tbody></table>
          </div>
          <div class="table-footer"><span class="table-count" id="tableCount">—</span></div>
        </div>
        <div class="panel reveal" data-delay="80">
          <div class="panel__header"><div class="panel__title"><span class="panel-icon">◎</span>Detalle</div></div>
          <div class="detail-placeholder" id="detailPh"><div class="detail-ph-icon">▦</div><p>Selecciona una estancia<br/>para ver sus detalles</p></div>
          <div class="detail-content" id="detailContent" style="display:none"></div>
        </div>
      </div>
    </div>
  </main>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal__header"><div class="modal__title" id="modalTitle">Nueva Estancia</div><button class="modal__close" id="modalClose">✕</button></div>
      <div class="modal__body">
        <form class="admin-form" id="estanciaForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="admin-field"><label>Cliente <span class="req">*</span></label><select id="fCliente" required><option value="">Seleccionar…</option></select><span class="field-err" id="errCliente"></span></div>
          <div class="form-grid-2">
            <div class="admin-field"><label>Hotel <span class="req">*</span></label><select id="fHotel" required><option value="">Seleccionar…</option></select><span class="field-err" id="errHotel"></span></div>
            <div class="admin-field"><label>Tipo habitación <span class="req">*</span></label><select id="fTipoHab" required><option value="">Seleccionar…</option></select><span class="field-err" id="errTipoHab"></span></div>
          </div>
          <div class="admin-field"><label>N.º Habitación <span class="req">*</span></label><input type="text" id="fHabitacion" placeholder="Suite 501" required/><span class="field-err" id="errHabitacion"></span></div>
          <div class="form-grid-2">
            <div class="admin-field"><label>Fecha entrada <span class="req">*</span></label><input type="date" id="fEntrada" required/><span class="field-err" id="errEntrada"></span></div>
            <div class="admin-field"><label>Fecha salida <span class="req">*</span></label><input type="date" id="fSalida" required/><span class="field-err" id="errSalida"></span></div>
          </div>
          <div class="admin-field"><label>Estado</label><select id="fEstado"><option value="Próxima">Próxima</option><option value="En curso">En curso</option><option value="Finalizada">Finalizada</option></select></div>
        </form>
      </div>
      <div class="modal__footer">
        <button class="btn-admin btn-admin--ghost" id="btnCancelar">Cancelar</button>
        <button class="btn-admin btn-admin--primary" id="btnGuardar">Guardar estancia</button>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/sidebar.js"></script><script src="js/admin.js"></script><script src="js/data.js"></script><script src="js/estancias.js"></script>
</body>
</html>
