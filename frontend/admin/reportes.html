<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUXORIA — Reportes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/><link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-menu" id="sidebarToggle">☰</button>
      <div class="topbar-breadcrumb"><span class="tb-muted">Admin</span><span class="tb-sep">›</span><span>Reportes & Analítica</span></div>
      <div class="topbar-actions">
        <span class="topbar-date" id="topbarDate"></span>
        <button class="btn-admin btn-admin--ghost" id="btnExport">⬡ Exportar</button>
      </div>
    </header>
    <div class="admin-content">

      <!-- Summary KPIs -->
      <div class="kpi-grid">
        <div class="kpi-card reveal"><div class="kpi-icon" style="color:var(--gold)">▣</div><div class="kpi-body"><span class="kpi-label">Hoteles activos</span><span class="kpi-value" id="rHoteles">—</span></div></div>
        <div class="kpi-card reveal" data-delay="60"><div class="kpi-icon" style="color:var(--green)">⬡</div><div class="kpi-body"><span class="kpi-label">Reservas totales</span><span class="kpi-value" id="rReservas">—</span></div></div>
        <div class="kpi-card reveal" data-delay="120"><div class="kpi-icon" style="color:var(--blue)">▦</div><div class="kpi-body"><span class="kpi-label">Estancias totales</span><span class="kpi-value" id="rEstancias">—</span></div></div>
        <div class="kpi-card reveal" data-delay="180"><div class="kpi-icon" style="color:var(--gold)">▩</div><div class="kpi-body"><span class="kpi-label">Ingresos facturados</span><span class="kpi-value" id="rIngresos">—</span></div></div>
      </div>

      <!-- Report grid -->
      <div class="report-grid">

        <!-- 1. Reservaciones por hotel -->
        <div class="panel reveal" data-delay="0">
          <div class="panel__header"><div class="panel__title"><span class="panel-icon">⬡</span>Reservas por Hotel</div></div>
          <div class="report-body" id="chartReservas"></div>
        </div>

        <!-- 2. Ocupación por temporada -->
        <div class="panel reveal" data-delay="80">
          <div class="panel__header"><div class="panel__title"><span class="panel-icon">◉</span>Ocupación por Temporada</div></div>
          <div class="report-body" id="chartTemporada"></div>
        </div>

        <!-- 3. Ingresos por hotel -->
        <div class="panel reveal" data-delay="60">
          <div class="panel__header"><div class="panel__title"><span class="panel-icon">▩</span>Ingresos por Hotel</div></div>
          <div class="report-body" id="chartIngresos"></div>
        </div>

        <!-- 4. Clientes frecuentes -->
        <div class="panel reveal" data-delay="120">
          <div class="panel__header"><div class="panel__title"><span class="panel-icon">◙</span>Clientes Frecuentes</div></div>
          <div class="report-body" id="chartClientes"></div>
        </div>

      </div>

      <!-- 5. Gastos por tipo (wide) -->
      <div class="panel reveal" style="margin-top:0" data-delay="80">
        <div class="panel__header"><div class="panel__title"><span class="panel-icon">◊</span>Distribución de Gastos Adicionales</div></div>
        <div style="padding:1.5rem 2rem">
          <div id="chartGastos" style="display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap"></div>
        </div>
      </div>

    </div>
  </main>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/sidebar.js"></script><script src="js/admin.js"></script><script src="js/data.js"></script>
  <script>
  'use strict';
  const COLORS=['#c9a84c','#4a8ecb','#5cba8c','#e08c5c','#c96aa8','#8c5cba','#5c8cba','#e05c5c'];

  function fmt(n){return'€'+parseFloat(n||0).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0});}

  function hBar(label,val,max,color,suffix=''){
    const pct=max>0?(val/max*100):0;
    return`<div style="margin-bottom:.7rem">
      <div style="display:flex;justify-content:space-between;font-size:.65rem;margin-bottom:.25rem">
        <span style="color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%">${label}</span>
        <span style="color:var(--gold);font-weight:700">${suffix||val}</span>
      </div>
      <div style="height:14px;background:var(--bg-3);border-radius:3px;overflow:hidden;border:1px solid var(--card-border)">
        <div style="height:100%;width:0%;background:${color};border-radius:3px;transition:width .9s cubic-bezier(.4,0,.2,1)" data-w="${pct.toFixed(1)}"></div>
      </div>
    </div>`;
  }

  function animateBars(){
    document.querySelectorAll('[data-w]').forEach(b=>{setTimeout(()=>{b.style.width=b.dataset.w+'%';},100);});
  }

  function renderAll(){
    const hotels=LuxData.getHotels(),reservas=LuxData.getReservas(),estancias=LuxData.getEstancias(),
          gastos=LuxData.getGastos(),facturas=LuxData.getFacturas(),clientes=LuxData.getClientes(),
          temps=LuxData.getTemps();

    // KPIs
    document.getElementById('rHoteles').textContent=hotels.length;
    document.getElementById('rReservas').textContent=reservas.length;
    document.getElementById('rEstancias').textContent=estancias.length;
    const totalFact=facturas.filter(f=>f.estado!=='Anulada').reduce((s,f)=>s+f.total,0);
    document.getElementById('rIngresos').textContent=totalFact?fmt(totalFact):'—';

    // 1. Reservas por hotel
    const resByHotel={};
    hotels.forEach(h=>{resByHotel[h.id]={name:h.nombre,val:0};});
    reservas.forEach(r=>{if(r.hotelId&&resByHotel[r.hotelId])resByHotel[r.hotelId].val++;});
    const rb=Object.values(resByHotel).sort((a,b)=>b.val-a.val);
    const maxRb=rb.length?Math.max(...rb.map(x=>x.val),1):1;
    document.getElementById('chartReservas').innerHTML=rb.map((x,i)=>hBar(x.name,x.val,maxRb,COLORS[i%COLORS.length],`${x.val} reservas`)).join('')||'<p style="font-size:.72rem;color:var(--muted);padding:1rem">Sin datos.</p>';

    // 2. Ocupación por temporada
    const tempMap={};temps.forEach(t=>{tempMap[t.id]={name:t.nombre,tipo:t.tipo,val:0};});
    estancias.forEach(e=>{
      // find which temp this estancia falls in
      temps.forEach(t=>{if(e.entrada>=t.fechaInicio&&e.entrada<=t.fechaFin){if(tempMap[t.id])tempMap[t.id].val++;}});
    });
    const tb=Object.values(tempMap).sort((a,b)=>b.val-a.val).slice(0,6);
    const maxTb=tb.length?Math.max(...tb.map(x=>x.val),1):1;
    const tColors={'Alta':'#e05c5c','Media':'#4a8ecb','Baja':'#5cba8c'};
    document.getElementById('chartTemporada').innerHTML=tb.map(x=>hBar(x.name,x.val,maxTb,tColors[x.tipo]||COLORS[0],`${x.val} estancias`)).join('')||'<p style="font-size:.72rem;color:var(--muted);padding:1rem">Sin datos.</p>';

    // 3. Ingresos por hotel
    const ingByHotel={};hotels.forEach(h=>{ingByHotel[h.id]={name:h.nombre,val:0};});
    facturas.filter(f=>f.estado!=='Anulada').forEach(f=>{
      const e=estancias.find(x=>x.id===f.estanciaId);
      if(e&&ingByHotel[e.hotelId])ingByHotel[e.hotelId].val+=f.total;
    });
    const ib=Object.values(ingByHotel).sort((a,b)=>b.val-a.val);
    const maxIb=ib.length?Math.max(...ib.map(x=>x.val),1):1;
    document.getElementById('chartIngresos').innerHTML=ib.map((x,i)=>hBar(x.name,x.val,maxIb,COLORS[i%COLORS.length],fmt(x.val))).join('')||'<p style="font-size:.72rem;color:var(--muted);padding:1rem">Sin datos.</p>';

    // 4. Clientes frecuentes
    const estByClient={};
    estancias.forEach(e=>{estByClient[e.clienteId]=(estByClient[e.clienteId]||0)+1;});
    const cf=Object.entries(estByClient).map(([cId,n])=>{const c=clientes.find(x=>x.id===parseInt(cId));return{name:c?.nombre||'—',val:n};}).sort((a,b)=>b.val-a.val).slice(0,6);
    const maxCf=cf.length?Math.max(...cf.map(x=>x.val),1):1;
    document.getElementById('chartClientes').innerHTML=cf.map((x,i)=>hBar(x.name,x.val,maxCf,COLORS[i%COLORS.length],`${x.val} estancia${x.val!==1?'s':''}`)).join('')||'<p style="font-size:.72rem;color:var(--muted);padding:1rem">Sin datos.</p>';

    // 5. Gastos por tipo (vertical bars)
    const gByTipo={};
    gastos.forEach(g=>{gByTipo[g.tipo]=(gByTipo[g.tipo]||0)+g.monto;});
    const gb=Object.entries(gByTipo).sort((a,b)=>b[1]-a[1]);
    const maxGb=gb.length?Math.max(...gb.map(x=>x[1]),1):1;
    const TIPO_ICONS={Restaurante:'◉',Spa:'◈',Minibar:'◎',['Room Service']:'▣',Lavandería:'◊',Teléfono:'◇',Transporte:'⬡',Otros:'▦'};
    document.getElementById('chartGastos').innerHTML=gb.map(([tipo,total],i)=>{
      const pct=(total/maxGb*100).toFixed(1),color=COLORS[i%COLORS.length],icon=TIPO_ICONS[tipo]||'◎';
      return`<div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;min-width:80px;flex:1">
        <span style="font-size:.72rem;color:${color};font-weight:700">${fmt(total)}</span>
        <div style="width:100%;height:120px;background:var(--bg-3);border-radius:var(--radius-sm);border:1px solid var(--card-border);display:flex;align-items:flex-end;overflow:hidden">
          <div style="width:100%;height:0%;background:linear-gradient(to top,${color},${color}88);border-radius:var(--radius-sm);transition:height .9s cubic-bezier(.4,0,.2,1)" data-w="${pct}"></div>
        </div>
        <div style="text-align:center"><div style="font-size:.9rem;color:${color}">${icon}</div><div style="font-size:.6rem;color:var(--muted)">${tipo}</div></div>
      </div>`;
    }).join('')||'<p style="font-size:.72rem;color:var(--muted)">Sin datos de gastos.</p>';

    // Animate all bars (including vertical ones)
    requestAnimationFrame(()=>{
      document.querySelectorAll('[data-w]').forEach(b=>{
        const isVertical=b.parentElement?.style?.alignItems==='flex-end';
        setTimeout(()=>{
          if(isVertical)b.style.height=b.dataset.w+'%';
          else b.style.width=b.dataset.w+'%';
        },150);
      });
    });
  }

  document.getElementById('btnExport')?.addEventListener('click',()=>{AdminUtils.showToast('Reporte exportado como PDF.','success');});

  renderAll();
  </script>
</body>
</html>
