<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXORIA — Tarifas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" /><link rel="stylesheet" href="css/admin.css" />
</head>
<body class="admin-body">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="admin-main">
    <header class="admin-topbar">
      <button class="topbar-menu" id="sidebarToggle">☰</button>
      <div class="topbar-breadcrumb"><span class="tb-muted">Admin</span><span class="tb-sep">›</span><span>Tarifas</span></div>
      <div class="topbar-actions"><span class="topbar-date" id="topbarDate"></span></div>
    </header>
    <div class="admin-content">
      <div class="kpi-grid">
        <div class="kpi-card reveal"><div class="kpi-icon" style="color:var(--gold)">◈</div><div class="kpi-body"><span class="kpi-label">Tarifas registradas</span><span class="kpi-value" id="kpiTotal">0</span></div></div>
        <div class="kpi-card reveal" data-delay="60"><div class="kpi-icon" style="color:var(--green)">▣</div><div class="kpi-body"><span class="kpi-label">Precio promedio</span><span class="kpi-value" id="kpiProm">—</span></div></div>
        <div class="kpi-card reveal" data-delay="120"><div class="kpi-icon" style="color:#e05c5c">◉</div><div class="kpi-body"><span class="kpi-label">Precio máximo</span><span class="kpi-value" id="kpiMax">—</span></div></div>
        <div class="kpi-card reveal" data-delay="180"><div class="kpi-icon" style="color:var(--blue)">◎</div><div class="kpi-body"><span class="kpi-label">Precio mínimo</span><span class="kpi-value" id="kpiMin">—</span></div></div>
      </div>
      <div class="panel reveal" style="margin-top:0">
        <div class="panel__header">
          <div class="panel__title"><span class="panel-icon">◈</span>Tarifas por hotel</div>
          <div class="panel__tools">
            <select class="admin-select" id="filterHotel"><option value="">Todos los hoteles</option></select>
            <select class="admin-select" id="filterTipo"><option value="">Todos los tipos</option></select>
            <select class="admin-select" id="filterTemp"><option value="">Todas las temporadas</option></select>
            <button class="btn-admin btn-admin--primary" id="btnNuevo">+ Nueva tarifa</button>
          </div>
        </div>
        <div class="table-wrap">
          <table class="admin-table">
            <thead><tr>
              <th>Hotel</th><th>Tipo habitación</th><th>Temporada</th>
              <th>Precio / noche</th><th>IVA</th><th>Total c/IVA</th><th>Acciones</th>
            </tr></thead>
            <tbody id="tarifaBody"></tbody>
          </table>
        </div>
        <div class="table-footer"><span class="table-count" id="tableCount">—</span></div>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal__header"><div class="modal__title" id="modalTitle">Nueva Tarifa</div><button class="modal__close" id="modalClose">✕</button></div>
      <div class="modal__body">
        <form class="admin-form" id="tarifaForm" novalidate>
          <input type="hidden" id="fId" />
          <div class="admin-field"><label>Hotel <span class="req">*</span></label><select id="fHotel" required><option value="">Seleccionar…</option></select><span class="field-err" id="errHotel"></span></div>
          <div class="form-grid-2">
            <div class="admin-field"><label>Tipo de habitación <span class="req">*</span></label><select id="fTipo" required><option value="">Seleccionar…</option></select><span class="field-err" id="errTipo"></span></div>
            <div class="admin-field"><label>Temporada <span class="req">*</span></label><select id="fTemp" required><option value="">Seleccionar…</option></select><span class="field-err" id="errTemp"></span></div>
          </div>
          <div class="admin-field"><label>Precio por noche (€) <span class="req">*</span></label><input type="number" id="fPrecio" placeholder="150.00" min="0" step="0.01" required /><span class="field-err" id="errPrecio"></span></div>
          <div class="tarifa-preview" id="tarifaPreview" style="display:none">
            <div class="tp-row"><span>Precio base:</span><strong id="tpBase">—</strong></div>
            <div class="tp-row"><span id="tpIvaLabel">IVA (—%):</span><strong id="tpIva">—</strong></div>
            <div class="tp-row tp-row--total"><span>Total por noche:</span><strong id="tpTotal">—</strong></div>
          </div>
        </form>
      </div>
      <div class="modal__footer">
        <button class="btn-admin btn-admin--ghost" id="btnCancelar">Cancelar</button>
        <button class="btn-admin btn-admin--primary" id="btnGuardar">Guardar tarifa</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="deleteBackdrop">
    <div class="modal modal--sm">
      <div class="modal__header"><div class="modal__title">Eliminar tarifa</div><button class="modal__close" id="deleteClose">✕</button></div>
      <div class="modal__body"><div class="delete-confirm"><div class="delete-icon">⚠</div><p>¿Eliminar esta tarifa?</p><p class="delete-sub" id="deleteTarifaDesc"></p></div></div>
      <div class="modal__footer">
        <button class="btn-admin btn-admin--ghost" id="deleteCancelar">Cancelar</button>
        <button class="btn-admin btn-admin--danger" id="deleteConfirm">Eliminar</button>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/sidebar.js"></script><script src="js/admin.js"></script><script src="js/data.js"></script><script src="js/tarifas.js"></script>
</body>
</html>
